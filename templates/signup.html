<!DOCTYPE html>
<html>
<head>

    <title>회원가입</title>

    <style>

        body{
            background:#f4f6f8;
            font-family:Arial,sans-serif;
        }

        .box{
            width:400px;
            margin:100px auto;
            background:white;
            padding:30px;
            border-radius:12px;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
        }

        h2{
            text-align:center;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:10px;
            border:1px solid #ddd;
            border-radius:8px;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:15px;
            border:none;
            background:#3498db;
            color:white;
            border-radius:8px;
            cursor:pointer;
        }

        button:hover{
            background:#2980b9;
        }

        .error{
            color:red;
            margin-bottom:10px;
        }

        .login-link{
            text-align:center;
            margin-top:15px;
        }

    </style>

</head>
<body>

<div class="box">

    <h2>회원가입</h2>

    {% if error %}
        <div class="error">
            {{ error }}
        </div>
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <input
            type="text"
            name="username"
            placeholder="아이디"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="비밀번호"
            required
        >

        <button type="submit">
            회원가입
        </button>

    </form>

    <div class="login-link">
        <a href="/accounts/login/">
            로그인
        </a>
    </div>

</div>

</body>
</html>
