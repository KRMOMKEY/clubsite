<!DOCTYPE html>
<html>
<head>
    <title>내 프로필</title>

    <style>

        body{
            font-family:Arial;
            background:#f4f6f8;
            margin:0;
        }

        .container{
            width:1000px;
            margin:auto;
            padding:30px;
        }

        .box{
            background:white;
            border-radius:12px;
            padding:20px;
            margin-bottom:20px;
        }

        .post{
            padding:12px;
            border-bottom:1px solid #eee;
        }

        a{
            text-decoration:none;
            color:black;
        }

        .back{
            display:inline-block;
            margin-bottom:20px;
        }

    </style>
</head>
<body>

<div class="container">

    <a href="/" class="back">
        ← 홈으로
    </a>

    <div class="box">

        <h1>
            👤 {{ user.username }}
        </h1>

        <p>
            가입일 :
            {{ user.date_joined }}
        </p>

    </div>

    <div class="box">

        <h2>📊 활동 통계</h2>

        <p>작성 글 : {{ post_count }}</p>

        <p>작성 댓글 : {{ comment_count }}</p>

        <p>총 추천 점수 : {{ total_score }}</p>

    </div>

    <div class="box">

        <h2>📝 최근 작성 글</h2>

        {% for post in my_posts %}

            <div class="post">

                <a href="/post/{{ post.id }}/">

                    {{ post.title }}

                </a>

            </div>

        {% empty %}

            작성한 글이 없습니다.

        {% endfor %}

    </div>

</div>

</body>
</html>
