<!DOCTYPE html>
<html>
<head>
    <title>게시글 수정</title>
</head>
<body>

<h1>게시글 수정</h1>

<form method="post">
    {% csrf_token %}

    <input
        type="text"
        name="title"
        value="{{ post.title }}"
    >

    <br><br>

    <textarea name="content" rows="10" cols="60">{{ post.content }}</textarea>

    <br><br>

    <button type="submit">
        수정하기
    </button>

</form>

</body>
</html>
